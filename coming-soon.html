<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVR Building Projects — Coming Soon</title>
  <style>
    html { background: #111111; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #111111;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background image */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('images/project-modern-exterior.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
      animation: slowZoom 25s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from { transform: scale(1.0); }
      to   { transform: scale(1.08); }
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.8) 100%);
    }

    /* Red left edge */
    .red-line {
      position: fixed;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: #CC0000;
      z-index: 10;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px;
      max-width: 680px;
      width: 100%;
      animation: fadeUp 1s ease 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .logo-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(0.55rem, 2vw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #CC0000;
      margin-bottom: 48px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #CC0000;
      margin: 0 auto 40px;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      font-style: italic;
      margin-bottom: 52px;
      line-height: 1.6;
    }

    .contact-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px 32px;
      margin-bottom: 48px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-item:hover { color: #CC0000; }

    .contact-item svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
      color: #CC0000;
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #CC0000;
      border: 1px solid rgba(204,0,0,0.4);
      padding: 7px 14px;
      border-radius: 2px;
      background: rgba(204,0,0,0.06);
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      z-index: 5;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }
    .footer a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #CC0000; }

    @media (max-width: 480px) {
      .contact-row { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

    <div class="badges">

</html>
